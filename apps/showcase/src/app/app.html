<cr-cursor-dot />

<div class="cr-shell">
  <header class="cr-shell__header">
    <span class="cr-shell__brand">Creativo Design System</span>
    <nav class="cr-shell__nav">
      <a
        routerLink="/tokens"
        routerLinkActive="cr-shell__nav-link--active"
        crCursorTarget
        crCursorTargetStyle="scale"
        crCursorTargetLabel="View"
        >Tokens</a
      >
      <a
        routerLink="/controls"
        routerLinkActive="cr-shell__nav-link--active"
        crCursorTarget
        crCursorTargetStyle="scale"
        crCursorTargetLabel="View"
        >Controls</a
      >
    </nav>

    <div class="cr-shell__ds-toggles" data-testid="design-system-toggles">
      @for (density of densities; track density) {
      <button
        uiChip
        [uiSelected]="preferences.density() === density"
        [uiSize]="'compact'"
        type="button"
        (click)="preferences.setDensity(density)"
      >
        {{ density }}
      </button>
      }
      <button
        uiButton
        [uiVariant]="'bordered'"
        [uiSize]="'compact'"
        type="button"
        (click)="preferences.toggleTheme()"
      >
        {{ preferences.theme() === 'dark' ? 'Light' : 'Dark' }}
      </button>
    </div>
  </header>

  <main class="cr-shell__main">
    <router-outlet />
  </main>
</div>
