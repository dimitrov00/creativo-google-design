<a
  routerLink="/controls"
  uiText
  [uiFont]="'callout'"
  [uiWeight]="'regular'"
  [uiForeground]="'accent'"
  class="page__back"
>
  ← All controls
</a>

<h1 uiText [uiFont]="'largeTitle'" [uiWeight]="'bold'">Badge</h1>
<p
  uiText
  [uiFont]="'body'"
  [uiWeight]="'regular'"
  [uiForeground]="'secondary'"
  class="page__intro"
>
  <code>span[uiBadge]</code> — uiTone.
</p>

<section class="page__section">
  <h2 uiText [uiFont]="'title2'" [uiWeight]="'bold'">Tone</h2>
  <ui-stack uiAxis="horizontal" uiGap="regular" uiAlign="center">
    @for (tone of tones; track tone) {
    <ui-stack uiAxis="vertical" uiGap="tight" uiAlign="start">
      <span uiBadge [uiTone]="tone">Badge</span>
      <p
        uiText
        [uiFont]="'caption'"
        [uiWeight]="'medium'"
        [uiForeground]="'secondary'"
      >
        tone={{ tone }}
      </p>
    </ui-stack>
    }
  </ui-stack>
</section>
