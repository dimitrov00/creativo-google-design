<a
  routerLink="/controls"
  uiText
  [uiFont]="'callout'"
  [uiWeight]="'regular'"
  [uiForeground]="'accent'"
  class="page__back"
>
  ← All controls
</a>

<h1 uiText [uiFont]="'largeTitle'" [uiWeight]="'bold'">Chip</h1>
<p
  uiText
  [uiFont]="'body'"
  [uiWeight]="'regular'"
  [uiForeground]="'secondary'"
  class="page__intro"
>
  <code>button[uiChip]</code> — uiSelected × uiSize.
</p>

<section class="page__section">
  <h2 uiText [uiFont]="'title2'" [uiWeight]="'bold'">Selected × Size</h2>
  <ui-stack uiAxis="vertical" uiGap="comfortable">
    @for (selected of selectedStates; track selected) {
    <ui-stack uiAxis="horizontal" uiGap="regular" uiAlign="center">
      @for (size of sizes; track size) {
      <ui-stack uiAxis="vertical" uiGap="tight" uiAlign="start">
        <button uiChip [uiSelected]="selected" [uiSize]="size">Chip</button>
        <p
          uiText
          [uiFont]="'caption'"
          [uiWeight]="'medium'"
          [uiForeground]="'secondary'"
        >
          selected={{ selected }} size={{ size }}
        </p>
      </ui-stack>
      }
    </ui-stack>
    }
  </ui-stack>
</section>
