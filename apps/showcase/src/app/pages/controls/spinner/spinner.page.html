<a
  routerLink="/controls"
  uiText
  [uiFont]="'callout'"
  [uiWeight]="'regular'"
  [uiForeground]="'accent'"
  class="page__back"
>
  ← All controls
</a>

<h1 uiText [uiFont]="'largeTitle'" [uiWeight]="'bold'">Spinner</h1>
<p
  uiText
  [uiFont]="'body'"
  [uiWeight]="'regular'"
  [uiForeground]="'secondary'"
  class="page__intro"
>
  <code>ui-spinner</code> — uiSize.
</p>

<section class="page__section">
  <h2 uiText [uiFont]="'title2'" [uiWeight]="'bold'">Size</h2>
  <ui-stack uiAxis="horizontal" uiGap="regular" uiAlign="center">
    @for (size of sizes; track size) {
    <ui-stack uiAxis="vertical" uiGap="tight" uiAlign="start">
      <ui-spinner [uiSize]="size" />
      <p
        uiText
        [uiFont]="'caption'"
        [uiWeight]="'medium'"
        [uiForeground]="'secondary'"
      >
        size={{ size }}
      </p>
    </ui-stack>
    }
  </ui-stack>
</section>
