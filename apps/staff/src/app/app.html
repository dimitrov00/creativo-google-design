<cr-cursor-dot />

<div class="cr-shell">
  <header class="cr-shell__header">
    <span class="cr-shell__brand">Creativo Staff</span>
    <nav class="cr-shell__nav">
      <a
        routerLink="/"
        routerLinkActive="cr-shell__nav-link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        crCursorTarget
        crCursorTargetStyle="scale"
      >
        Dashboard
      </a>
      <a
        routerLink="/schedule"
        routerLinkActive="cr-shell__nav-link--active"
        crCursorTarget
        crCursorTargetStyle="scale"
        >Schedule</a
      >
    </nav>
    <cr-theme-toggle />
  </header>

  <main class="cr-shell__main">
    <router-outlet />
  </main>
</div>
