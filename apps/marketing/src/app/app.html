<ng-container *transloco="let t">
  <cr-cursor-dot />

  <div class="cr-shell">
    <header class="cr-shell__header">
      <a
        class="cr-shell__brand"
        routerLink="/"
        [attr.aria-label]="t('marketing.app.homeAria')"
        crCursorTarget
        crCursorTargetStyle="scale"
      >
        <img class="logo-light" src="/logo-black.svg" alt="Creativo" />
        <img class="logo-dark" src="/logo-white.svg" alt="Creativo" />
      </a>

      <nav
        class="cr-shell__nav"
        [attr.data-open]="menuOpen() ? '' : null"
        [attr.aria-label]="t('marketing.app.primaryNav')"
      >
        <a
          href="/#work"
          crText
          font="eyebrow"
          crCursorTarget
          (click)="closeMenu()"
        >
          {{ t('marketing.app.work') }}
        </a>
        <a
          href="/#services"
          crText
          font="eyebrow"
          crCursorTarget
          (click)="closeMenu()"
        >
          {{ t('marketing.app.services') }}
        </a>
        <a
          href="/#team"
          crText
          font="eyebrow"
          crCursorTarget
          (click)="closeMenu()"
        >
          {{ t('marketing.app.barbers') }}
        </a>
        <a
          href="/#locations"
          crText
          font="eyebrow"
          crCursorTarget
          (click)="closeMenu()"
        >
          {{ t('marketing.app.locations') }}
        </a>
        <a
          class="cr-shell__nav-extra"
          href="/client"
          crText
          font="eyebrow"
          crCursorTarget
          (click)="closeMenu()"
        >
          {{ t('marketing.app.login') }}
        </a>
        <a
          class="cr-shell__nav-extra"
          href="/client"
          crText
          font="eyebrow"
          crCursorTarget
          (click)="closeMenu()"
        >
          {{ t('marketing.app.book') }}
        </a>
      </nav>

      <div class="cr-shell__actions">
        <a
          class="cr-shell__login"
          href="/client"
          crText
          font="eyebrow"
          crCursorTarget
          crCursorTargetStyle="fill"
        >
          {{ t('marketing.app.login') }}
        </a>

        <!-- @angular/aria menu (v22 GA): the trigger/menu/item directives own
             role/aria-expanded/aria-haspopup, arrow-key + typeahead
             navigation, focus management, and Escape/focus-out closing — the
             previous hand-rolled document-click/keydown listeners are gone.
             Content renders lazily via ngMenuContent (replaces the old @if). -->
        <div class="cr-shell__language">
          <button
            type="button"
            class="cr-shell__language-toggle"
            ngMenuTrigger
            [menu]="langMenu"
            [attr.aria-label]="t('marketing.app.language')"
            crCursorTarget
            crCursorTargetStyle="fill"
          >
            <span class="material-symbols-rounded" aria-hidden="true"
              >language</span
            >
          </button>

          <div
            class="cr-shell__language-menu"
            ngMenu
            #langMenu="ngMenu"
            (itemSelected)="setLanguage($event)"
          >
            <ng-template ngMenuContent>
              @for (lang of languages; track lang.code) {
              <button
                type="button"
                ngMenuItem
                [value]="lang.code"
                role="menuitemradio"
                [attr.aria-checked]="activeLang() === lang.code"
                crText
                font="caption"
                fontWeight="semibold"
                [attr.data-active]="activeLang() === lang.code ? '' : null"
                crCursorTarget
              >
                <span>{{ lang.label }}</span>
                @if (activeLang() === lang.code) {
                <span class="material-symbols-rounded" aria-hidden="true"
                  >check</span
                >
                }
              </button>
              }
            </ng-template>
          </div>
        </div>

        <button
          type="button"
          class="cr-shell__menu"
          [attr.data-open]="menuOpen() ? '' : null"
          [attr.aria-label]="t('marketing.app.toggleMenu')"
          [attr.aria-expanded]="menuOpen()"
          (click)="toggleMenu()"
          crCursorTarget
          crCursorTargetStyle="fill"
        >
          <span></span><span></span>
        </button>
      </div>
    </header>

    <main class="cr-shell__main">
      <router-outlet />
    </main>
  </div>
</ng-container>
