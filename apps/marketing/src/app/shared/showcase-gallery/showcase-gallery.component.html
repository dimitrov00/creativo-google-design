<section class="showcase-gallery" [attr.aria-label]="ariaLabel()">
  @if (showToggle()) {
    <button
      type="button"
      class="showcase-gallery__layout-toggle"
      [attr.aria-label]="expanded() ? carouselViewLabel() : gridViewLabel()"
      [attr.aria-pressed]="expanded()"
      (click)="toggleLayout()"
      crCursorTarget
      crCursorTargetStyle="fill"
    >
      <span class="material-symbols-rounded" aria-hidden="true">
        {{ expanded() ? 'view_carousel' : 'grid_view' }}
      </span>
    </button>
  }

  <div class="showcase-gallery__track">
    @for (image of images(); track $index; let imageIndex = $index) {
      <figure [class.is-active]="activeIndex() === imageIndex">
        <img [src]="image" [alt]="imageAlt()" loading="lazy" />
      </figure>
    }
  </div>
</section>
