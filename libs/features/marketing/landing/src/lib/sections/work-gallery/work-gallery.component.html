<ng-container *transloco="let t">
  <div
    #container
    class="cr-gallery"
    [style.height]="'calc(100vh + ' + scrollDistance() + 'px)'"
  >
    <!-- Accessible section heading (visually hidden) — reuses the sitemap's
         section name key. -->
    <h2 uiVisuallyHidden>{{ t('landing.footer.nav.work') }}</h2>

    <div class="cr-gallery__stage">
      <!-- Scroll-driven image strip -->
      <div #strip class="cr-gallery__strip">
        @for (shot of shots; track shot.id) {
          <button
            #card
            type="button"
            class="cr-gallery__card"
            uiInteractive
            [class.cr-gallery__card--motion]="motionEnabled()"
            [style.aspect-ratio]="shot.aspectRatio"
            [style.--drift]="motionEnabled() ? shot.driftY + 'px' : '0px'"
            (click)="openLightbox(shot)"
            [attr.aria-label]="content.text(shot.alt)"
          >
            <ui-async-image
              class="cr-gallery__figure"
              [uiSrc]="shot.src"
              [uiRing]="true"
            />
          </button>
        }
      </div>

      <!-- Gradient grounds the caption and progress bar (overlay scaffold
           from the DS; the background-ink grade stays local) -->
      <div class="cr-gallery__fade" uiOverlay aria-hidden="true"></div>

      <!-- Per-image caption — recreated per index so the entrance replays -->
      <div class="cr-gallery__caption-slot">
        @for (index of [activeIndex()]; track index) {
          <p
            class="cr-gallery__caption"
            uiText
            uiFont="title"
            data-testid="work-gallery-caption"
          >
            {{ t(shots[index]?.captionKey ?? '') }}
          </p>
        }
      </div>

      <!-- Progress bar — 3px accent fill -->
      <div class="cr-gallery__progress" aria-hidden="true">
        <div #progressFill class="cr-gallery__progress-fill"></div>
      </div>
    </div>
  </div>

  <!-- Lightbox — ui-sheet owns scrim, layering, Escape/backdrop dismissal,
       focus trap/restore and body scroll lock. `data-on-media` flips the
       ring hairline to the white on-media ramp (the scrim below is black in
       both themes). -->
  <ui-sheet
    class="cr-gallery__lightbox"
    data-testid="work-gallery-lightbox"
    data-on-media
    uiPlacement="center"
    uiMaterial="thin"
    [uiOpen]="lightboxShot() !== null"
    (uiDismissed)="closeLightbox()"
    [attr.aria-label]="lightboxAlt()"
  >
    @if (lightboxShot(); as shot) {
      <img
        class="cr-gallery__lightbox-image"
        [src]="shot.src"
        [alt]="content.text(shot.alt)"
      />
      <div uiOverlay="ring" aria-hidden="true"></div>
      <button
        type="button"
        uiButton
        uiVariant="overlay"
        uiShape="capsule"
        [uiIconOnly]="true"
        class="cr-gallery__lightbox-close"
        data-testid="work-gallery-lightbox-close"
        [attr.aria-label]="t('landing.nav.close')"
        (click)="closeLightbox()"
      >
        <ui-icon uiName="sheet.close" />
      </button>
    }
  </ui-sheet>
</ng-container>
