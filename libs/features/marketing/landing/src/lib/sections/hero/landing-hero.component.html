<ng-container *transloco="let t">
  <!-- The inset film card (v2 VideoHero) — a ZStack: ambient video, center
       vignette, centered copy, prefs toolbar. Source order stacks the
       layers; no z-index needed. -->
  <ui-stack uiAxis="z" uiRadius="hero" class="cr-hero__card cr-squircle">
    <ui-ambient-video
      class="cr-hero__media"
      uiSrc="/hero.mp4"
      uiPoster="/work/landing-poster.jpg"
    />

    <!-- Center vignette — copy sits mid-card (closing-CTA register). -->
    <div class="cr-hero__scrim" uiOverlay="vignette" aria-hidden="true"></div>

    <ui-stack uiAlign="center" uiGap="loose" class="cr-hero__content">
      <!-- Centered trio — title, paragraph, one capsule CTA (no icon),
           mirroring the closing CTA so the page opens and closes on the
           same chord (one shared cr-booking-cta). -->
      <ui-section-header uiAlign="center" [uiOnMedia]="true">
        <h1
          uiTitle
          uiReveal
          uiRevealTrigger="mount"
          [uiRevealDelay]="150"
          uiRevealRise="18px"
        >
          {{ t('landing.hero.heading') }}
        </h1>
        <p
          uiLede
          uiReveal
          uiRevealTrigger="mount"
          [uiRevealDelay]="320"
          uiRevealRise="12px"
        >
          {{ t('landing.hero.subtitle') }}
        </p>
      </ui-section-header>
      <cr-booking-cta
        labelKey="landing.hero.cta"
        [onMedia]="true"
        testId="landing-hero-cta"
        uiReveal
        uiRevealTrigger="mount"
        [uiRevealDelay]="480"
        uiRevealRise="14px"
      />
    </ui-stack>

    <!-- Bottom toolbar inside the media (SwiftUI bottomBar placement) —
         chrome appears, it doesn't perform: opacity-only entrance. The
         outer layer carries the scroll-exit parallax; the inner stack
         carries the reveal (WAAPI fill would out-prioritize the CSS exit
         animation on the same element). -->
    <div class="cr-hero__toolbar">
      <ui-stack
        uiAxis="horizontal"
        uiGap="regular"
        uiAlign="center"
        uiReveal="fade"
        uiRevealTrigger="mount"
        [uiRevealDelay]="650"
      >
        <cr-locale-theme-toggle variant="overlay" />
      </ui-stack>
    </div>
  </ui-stack>
</ng-container>
