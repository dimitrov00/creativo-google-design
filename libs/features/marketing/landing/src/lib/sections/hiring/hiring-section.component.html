<ng-container *transloco="let t">
  <section class="cr-hiring__section">
    <ui-stack
      #card
      uiAxis="z"
      uiReveal="fade-up"
      class="cr-hiring__card cr-squircle"
      (mousemove)="onMouseMove($event)"
      (mouseleave)="onMouseLeave()"
    >
      <!-- ── Ambient film (poster fallback, reduced-motion, crossfade all
           owned by ui-ambient-video) ── -->
      <ui-ambient-video
        class="cr-hiring__video"
        uiSrc="/welcome.mp4"
        uiPoster="/work/landing-poster.jpg"
      />

      <!-- ── Static overlays ── -->
      <div uiOverlay="scrim-media" aria-hidden="true"></div>
      <div class="cr-hiring__warmth" uiOverlay="plain" aria-hidden="true"></div>

      <!-- ── Cursor spotlight ── -->
      @if (!reducedMotion()) {
        <div
          class="cr-hiring__spotlight"
          uiOverlay="plain"
          aria-hidden="true"
        ></div>
      }

      <!-- Film grain -->
      <div
        class="cr-hiring__grain cr-grain"
        uiOverlay="plain"
        aria-hidden="true"
      ></div>

      <!-- ── Content ── -->
      <div class="cr-hiring__content">
        <ui-section-header uiAlign="center" [uiOnMedia]="true">
          <p uiEyebrow uiReveal="fade-up" [uiRevealDelay]="50">
            {{ t('landing.hiring.eyebrow') }}
          </p>

          <h2
            #title
            uiTitle
            class="cr-hiring__title"
            [attr.data-motion]="motionReady() ? '' : null"
            [attr.data-revealed]="revealed() ? '' : null"
          >
            @for (word of words(); track $index) {
              <span class="cr-hiring__word" [style.--word-i]="$index">{{
                word
              }}</span>
            }
          </h2>

          <p uiLede uiReveal="fade-up" [uiRevealDelay]="420">
            {{ t('landing.hiring.subtitle') }}
          </p>
        </ui-section-header>

        <div
          class="cr-hiring__actions"
          uiReveal="fade-up"
          [uiRevealDelay]="580"
        >
          <a
            uiButton
            uiVariant="overlay"
            uiSize="prominent"
            uiShape="capsule"
            class="cr-hiring__cta"
            href="https://instagram.com/creativo.barbershop"
            target="_blank"
            rel="noopener"
          >
            {{ t('landing.hiring.cta') }}
            <ui-icon uiName="hiring.apply" />
          </a>
        </div>
      </div>
    </ui-stack>
  </section>
</ng-container>
