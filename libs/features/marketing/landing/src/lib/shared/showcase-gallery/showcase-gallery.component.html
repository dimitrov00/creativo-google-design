<section class="showcase-gallery" [attr.aria-label]="ariaLabel()">
  @if (showToggle()) {
    <button
      type="button"
      uiButton
      uiVariant="tinted"
      uiShape="capsule"
      uiSize="regular"
      [uiIconOnly]="true"
      [uiSelected]="expanded()"
      class="showcase-gallery__layout-toggle"
      [attr.aria-label]="expanded() ? carouselViewLabel() : gridViewLabel()"
      (click)="toggleLayout()"
    >
      <ui-icon [uiName]="expanded() ? 'gallery.strip' : 'gallery.grid'" />
    </button>
  }

  @if (expanded()) {
    <ui-grid class="showcase-gallery__track" [uiColumns]="3" uiGap="compact">
      @for (image of images(); track $index) {
        <figure uiRadius="prominent">
          <ui-async-image [uiSrc]="image" [uiAlt]="imageAlt()" />
        </figure>
      }
    </ui-grid>
  } @else {
    <ui-scroll-row
      class="showcase-gallery__track"
      uiSnap="center"
      uiGap="compact"
    >
      @for (image of images(); track $index) {
        <figure uiRadius="prominent">
          <ui-async-image [uiSrc]="image" [uiAlt]="imageAlt()" />
        </figure>
      }
    </ui-scroll-row>
  }
</section>
