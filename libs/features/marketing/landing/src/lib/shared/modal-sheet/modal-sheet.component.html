<div
  class="modal-sheet"
  [attr.data-open]="open() ? '' : null"
  [attr.data-closing]="closing() ? '' : null"
  [attr.data-dragging]="dragging() ? '' : null"
  [attr.id]="sheetId()"
  role="dialog"
  [attr.aria-labelledby]="labelledBy()"
  [attr.aria-modal]="open() || closing() ? 'true' : null"
  [attr.aria-hidden]="open() || closing() ? null : 'true'"
  (pointerdown)="onBackdropPointerDown($event)"
  (pointerup)="onBackdropPointerUp($event)"
  (keydown)="onKeydown($event)"
>
  <div class="modal-sheet__surface">
    <div class="modal-sheet__scroll" (scroll)="onScroll($event)">
      <header
        class="modal-sheet__toolbar"
        (pointerdown)="onDragStart($event)"
        (pointermove)="onDragMove($event)"
        (pointerup)="onDragEnd($event)"
        (pointercancel)="onDragEnd($event)"
      >
        <!-- Grabber — signals the bottom sheet's drag-to-dismiss gesture
             (mobile presentation only, see CSS). -->
        <span class="modal-sheet__grabber" aria-hidden="true"></span>
        <div
          class="modal-sheet__title"
          [attr.data-visible]="titleVisible() ? '' : null"
          aria-hidden="true"
        >
          <ng-content select="[sheet-title]" />
        </div>
        <button
          type="button"
          class="modal-sheet__close"
          [attr.aria-label]="closeLabel()"
          (click)="requestDismiss()"
        >
          <span
            class="material-symbols-rounded modal-sheet__close-glyph"
            aria-hidden="true"
            >close</span
          >
        </button>
      </header>

      <ng-content />
    </div>

    <ng-content select="[sheet-overlay]" />
  </div>
</div>
