<!-- v2 routes/index.tsx LandingPage — the page shell. -->
<div class="cr-landing" data-page-shell>
  <!-- Safe-area strips: keep the notch / home-indicator on plain background
       as content scrolls beneath (v2's fixed h-safe-top/bottom bands). -->
  <div class="cr-landing__safe cr-landing__safe--top" aria-hidden="true"></div>
  <div
    class="cr-landing__safe cr-landing__safe--bottom"
    aria-hidden="true"
  ></div>

  <cr-landing-header />
  <cr-landing-hero />

  <main class="cr-landing__main">
    <div id="work" class="cr-landing__anchor">
      <cr-work-gallery />
    </div>
    <!-- Old-app full-width spread — breaks out of the app column like the
         locations section (design call). -->
    <div id="team" class="cr-landing__anchor cr-landing__anchor--breakout">
      <cr-team-showcase />
    </div>
    <div id="services" class="cr-landing__anchor">
      <cr-services-section />
    </div>
    <div id="hiring" class="cr-landing__anchor">
      <cr-hiring-section />
    </div>
    <div id="visit" class="cr-landing__anchor cr-landing__anchor--breakout">
      <!-- The locations section owns a MapLibre map (~1MB) — `@defer (on
           viewport)` keeps it out of the initial bundle (v2 lazy rule). -->
      @defer (on viewport) {
      <cr-locations />
      } @placeholder {
      <div class="cr-landing__locations-placeholder" aria-hidden="true"></div>
      }
    </div>
    <cr-closing-cta />
  </main>

  <cr-landing-footer />
</div>
