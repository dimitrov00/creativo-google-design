<!-- v2 routes/index.tsx LandingPage — the page shell. -->
<div class="cr-landing" data-page-shell>
  <!-- Safe-area strips: keep the notch / home-indicator on plain background
       as content scrolls beneath (v2's fixed h-safe-top/bottom bands). -->
  <div class="cr-landing__safe cr-landing__safe--top" aria-hidden="true"></div>
  <div
    class="cr-landing__safe cr-landing__safe--bottom"
    aria-hidden="true"
  ></div>

  <cr-landing-header />
  <cr-landing-hero />

  <!-- Funnel order (owner call, 2026-07-23): proof leads — the work
       gallery sits directly under the hero — then the offer (services),
       then team, then logistics (locations), with the recruiting pitch
       demoted below locations. -->
  <!-- .cr-landing__main is a structural hook only (the nav menu's
       inertSelectors target it); the centered column rides uiFrame. -->
  <main
    class="cr-landing__main"
    uiFrame
    [uiFrameMaxWidth]="'var(--landing-max-width)'"
  >
    <div id="work" class="cr-landing__anchor">
      <cr-work-gallery />
    </div>
    <div id="services" class="cr-landing__anchor">
      <cr-services-section />
    </div>
    <div id="team" class="cr-landing__anchor">
      <cr-team-showcase />
    </div>
    <div id="visit" class="cr-landing__anchor">
      <!-- The locations section owns a MapLibre map (~1MB) — `@defer (on
           viewport)` keeps it out of the initial bundle (v2 lazy rule). -->
      @defer (on viewport) {
      <cr-locations />
      } @placeholder {
      <!-- Reserves room so the section doesn't jump on hydrate. -->
      <ui-skeleton
        uiAnimation="none"
        uiRadius="regular"
        uiFrame
        [uiFrameHeight]="'40rem'"
        aria-hidden="true"
      />
      }
    </div>
    <div id="hiring" class="cr-landing__anchor">
      <cr-hiring-section />
    </div>
    <cr-closing-cta />
  </main>

  <cr-landing-footer />
</div>
