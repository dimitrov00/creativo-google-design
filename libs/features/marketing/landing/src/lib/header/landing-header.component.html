<ng-container *transloco="let t">
  <header
    class="cr-header"
    data-testid="landing-header"
    [attr.data-view]="isSolid() ? 'solid' : 'float'"
    [style.transform]="headerTransform()"
  >
    <ui-toolbar
      class="cr-header__inner"
      [uiTone]="isSolid() ? 'default' : 'overlay'"
    >
      <a routerLink="/" class="cr-header__brand" aria-label="Creativo">
        <img
          [src]="logoWhite() ? '/logo-white.svg' : '/logo-black.svg'"
          alt="Creativo"
          uiFrame
          [uiFrameHeight]="'1.5rem'"
        />
      </a>

      <ui-stack uiAxis="horizontal" uiAlign="center" uiGap="tight">
        @if (!isAuthed()) {
          <a
            routerLink="/auth"
            [queryParams]="{ redirect: '/account' }"
            uiButton
            [uiVariant]="isSolid() ? 'tinted' : 'overlay'"
            uiSize="regular"
            uiShape="capsule"
            data-testid="landing-login-pill"
          >
            <ui-icon uiName="auth.locked" />
            {{ t('landing.nav.login') }}
          </a>
        }

        <button
          type="button"
          uiButton
          [uiVariant]="isSolid() ? 'tinted' : 'overlay'"
          uiSize="regular"
          uiShape="capsule"
          [uiIconOnly]="true"
          [uiSelected]="menuOpen()"
          data-testid="nav-menu-trigger"
          [attr.aria-label]="
            menuOpen() ? t('landing.nav.close') : t('landing.nav.menu')
          "
          [attr.aria-expanded]="menuOpen()"
          (click)="toggleMenu()"
        >
          <cr-menu-icon [open]="menuOpen()" />
        </button>
      </ui-stack>
    </ui-toolbar>
  </header>

  <cr-landing-menu
    [open]="menuOpen()"
    [isAuthed]="isAuthed()"
    (closed)="menuOpen.set(false)"
  />
</ng-container>
